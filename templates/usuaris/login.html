{% extends 'base.html' %}
{% block content %}
<div
  class="max-w-sm mx-auto mt-12 mb-16 p-6 sm:p-8 bg-white rounded-2xl shadow-[var(--shadow-card)] border border-[var(--color-border)]">
  <h2 class="text-2xl font-bold mb-6 text-center text-[var(--color-text)]">Iniciar sessió</h2>
  {% if error %}
  <div class="p-4 mb-6 text-sm text-red-800 rounded-lg bg-red-50 border border-red-200" role="alert">
    {{ error }}
  </div>
  {% endif %}
  <form method="post" id="login-form" novalidate class="flex flex-col gap-2">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="mt-4">
      <button type="submit" class="btn-primary">
        <div>
          <p>Entrar</p>
          <p>Entrar</p>
        </div>
      </button>
    </div>

    <div class="mt-6 text-center text-sm text-gray-600">
      No tens compte? <a href="{% url 'usuaris:registre' %}"
        class="text-[var(--color-primary)] font-medium hover:underline transition-all">Registra't</a>
    </div>
  </form>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("login-form");
    if (!form) return;

    const correuInput = form.querySelector("[name='correu']");
    const contrasenyaInput = form.querySelector("[name='contrasenya']");

    const rules = {
      correu: function (value) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!value.trim()) return "El correu és obligatori.";
        if (!emailRegex.test(value.trim())) return "Introdueix un correu vàlid.";
        return "";
      },
      contrasenya: function (value) {
        if (!value) return "La contrasenya és obligatòria.";
        if (value.length < 8) return "La contrasenya ha de tenir almenys 8 caràcters.";
        if (value.length > 128) return "La contrasenya no pot tenir més de 128 caràcters.";
        return "";
      }
    };

    function getErrorNode(input) {
      const parent = input.closest("p") || input.parentElement;
      let node = parent.querySelector(".js-error");
      if (!node) {
        node = document.createElement("div");
        node.className = "text-red-700 text-sm mt-1 js-error";
        parent.appendChild(node);
      }
      return node;
    }

    function setError(input, message) {
      const node = getErrorNode(input);
      node.textContent = message;
      input.classList.add("border-red-700", "focus:ring-red-700/20", "focus:border-red-700");
    }

    function clearError(input) {
      const node = getErrorNode(input);
      node.textContent = "";
      input.classList.remove("border-red-700", "focus:ring-red-700/20", "focus:border-red-700");
    }

    function validateField(input) {
      const fieldName = input.name;
      const validator = rules[fieldName];
      if (!validator) return true;
      const message = validator(input.value);
      if (message) {
        setError(input, message);
        return false;
      }
      clearError(input);
      return true;
    }

    [correuInput, contrasenyaInput].forEach(function (input) {
      if (!input) return;
      input.addEventListener("input", function () {
        validateField(input);
      });
      input.addEventListener("blur", function () {
        validateField(input);
      });
    });

    form.addEventListener("submit", function (event) {
      const isCorreuValid = correuInput ? validateField(correuInput) : true;
      const isContrasenyaValid = contrasenyaInput ? validateField(contrasenyaInput) : true;
      if (!isCorreuValid || !isContrasenyaValid) {
        event.preventDefault();
      }
    });
  });
</script>
{% endblock %}
