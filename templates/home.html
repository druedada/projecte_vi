{% extends "base.html" %}
{% load static %}

{% block title %}Inici | Projecte VI{% endblock %}

{% block extra_head %}
<!-- Cargar GSAP y ScrollTrigger desde CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
{% endblock %}

{% block content %}
<!-- Sección Hero Cinematográfica -->
<section id="hero-section" class="relative w-full h-[100vh] flex flex-col overflow-hidden bg-black">
    <!-- Video -->
    <video id="hero-video" class="absolute top-0 left-0 w-full h-full object-cover" muted playsinline preload="auto"
        poster="{% static 'img/hero.png' %}">
        <source src="https://qlospituzlkeupygtwff.supabase.co/storage/v1/object/public/hero/hero-scrub.mp4"
            type="video/mp4">
    </video>

    <!-- Overlay Oscuro Suave -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70 z-10 pointer-events-none">
    </div>

    <!-- Contenido Hero -->
    <div class="relative z-20 flex flex-col items-start justify-center w-full h-full text-left text-white container-padding">
        <span class="text-xs md:text-sm tracking-[0.2em] text-gray-300 uppercase mb-4 font-semibold drop-shadow-md">
            Pierola, 2021
        </span>
        <h1 class="text-5xl md:text-7xl font-extralight text-white tracking-tight leading-tight mb-6 drop-shadow-lg">
            TRUPIESSU
        </h1>
        <span class="text-xs md:text-sm tracking-[0.2em] text-gray-300 uppercase mb-4 font-semibold drop-shadow-md">
            Vinya vella de sumoll
        </span>        
        <p class="text-base md:text-xl text-gray-200 font-light mb-10 max-w-2xl drop-shadow-md">
            L'única forma d'apendre...
        </p>
        <form method="post" action="{% url 'comandes:afegir_al_carret' 3 %}">
            {% csrf_token %}
            <input type="hidden" name="quantitat" value="1">
            <button type="submit"
                class="px-8 py-3 bg-white text-black text-sm uppercase tracking-wider font-semibold rounded-full hover:bg-gray-200 hover:-translate-y-1 transition-all duration-300 shadow-[0_4px_20px_rgba(255,255,255,0.2)]">
                Afegir al carro
            </button>
        </form>
    </div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Registrar ScrollTrigger de GSAP
        gsap.registerPlugin(ScrollTrigger);

        const video = document.getElementById("hero-video");
        const heroSection = document.getElementById("hero-section");

        // Inicializar la animación de "scrubbing"
        const initVideoScrub = () => {
            // Asegurar que partimos del frame 0
            video.currentTime = 0;

            // Crear una línea de tiempo para interpolar el `currentTime` del video
            let tl = gsap.timeline({
                scrollTrigger: {
                    trigger: heroSection,
                    start: "top top",
                    end: "+=250%",  // Controla la "duración" del scroll. Aumentar para un scrub más lento
                    pin: true,      // Fija la sección hero en pantalla
                    scrub: 1,       // Scrub suave
                }
            });

            // Interpolar (animar) desde currentTime = 0 hasta el final del video
            tl.to(video, {
                currentTime: video.duration || 1, // Fallback duration in case it fails metadata read
                ease: "none"
            });
        };

        // Asegurarnos de que tenemos los metadatos y la duración del video disponibles
        if (video.readyState >= 1) {
            initVideoScrub();
        } else {
            video.addEventListener("loadedmetadata", initVideoScrub);
        }
    });
</script>
{% endblock %}
